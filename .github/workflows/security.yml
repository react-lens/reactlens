name: Security & Quality Audit

on:
  pull_request:
    branches: [ "main", "master" ]

jobs:
  inspect:
    name: Inspect Codebase
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Run Unit Tests
      run: npm test

    - name: Run Self-Audit (Security Gates)
      run: npm run audit:self
